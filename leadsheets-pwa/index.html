<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Lead Sheets</title>
  <link rel="manifest" href="manifest.json">
  <style>
    /* ── Variables ──────────────────────────────────────────────────── */
    :root {
      --bg-base:        #0a0a0f;
      --bg-surface:     #12121a;
      --bg-elevated:    #1a1a28;
      --bg-hover:       #222236;
      --text-primary:   #e8e8f0;
      --text-secondary: #8888a0;
      --text-tertiary:  #55556a;
      --accent-cyan:    #00f0ff;
      --accent-magenta: #ff2d55;
      --accent-green:   #30d158;
      --accent-purple:  #bf5af2;
      --border-subtle:  rgba(255, 255, 255, 0.06);
      --border-default: rgba(255, 255, 255, 0.1);
      --shadow-glow-cyan: 0 0 20px rgba(0, 240, 255, 0.3);
      --space-1:  4px;
      --space-2:  8px;
      --space-3:  12px;
      --space-4:  16px;
      --space-5:  20px;
      --space-6:  24px;
      --space-8:  32px;
      --space-10: 40px;
      --space-12: 48px;
      --radius-sm:   4px;
      --radius-md:   8px;
      --radius-lg:   12px;
      --font-family:   'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --font-mono:     'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      --font-size-xs:   11px;
      --font-size-sm:   13px;
      --font-size-base: 15px;
      --font-size-lg:   18px;
      --font-size-xl:   24px;
      --font-weight-normal: 400;
      --font-weight-medium: 500;
      --font-weight-bold:   600;
      --transition-fast: 100ms ease;
      --transition-base: 200ms ease;
    }

    /* ── Base reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100vh;
      font-family: var(--font-family);
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── Lead Sheets Layout ─────────────────────────────────────────── */
    .leadsheets-panel { height: 100vh; overflow: hidden; }
    .ls-layout { display: flex; height: 100vh; }

    /* ── Sidebar ──────────────────────────────────────────────────────── */
    .ls-sidebar {
      width: 240px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border-subtle);
      background: var(--bg-surface);
      overflow: hidden;
    }
    .ls-search {
      display: flex; gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    .ls-search__input {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: var(--font-size-sm);
      padding: var(--space-2) var(--space-3);
      outline: none;
      box-sizing: border-box;
    }
    .ls-search__input:focus { border-color: var(--accent-cyan); }

    /* ── Import button ───────────────────────────────────────────────── */
    .ls-import-btn {
      background: var(--bg-elevated); border: 1px solid var(--border-default);
      border-radius: var(--radius-md); color: var(--accent-cyan);
      font-size: var(--font-size-base); cursor: pointer;
      padding: var(--space-2) var(--space-3);
      flex-shrink: 0; white-space: nowrap;
      transition: background var(--transition-base), border-color var(--transition-base);
    }
    .ls-import-btn:hover { border-color: var(--accent-cyan); background: rgba(0,240,255,0.08); }

    /* ── Tag filter row ───────────────────────────────────────────────── */
    .ls-tag-filters {
      display: flex;
      gap: var(--space-1);
      padding: var(--space-2) var(--space-4);
      border-bottom: 1px solid var(--border-subtle);
    }
    .ls-filter-btn {
      flex: 1;
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      font-size: 11px;
      padding: var(--space-1) 0;
      cursor: pointer;
      transition: background var(--transition-base), color var(--transition-base), border-color var(--transition-base);
    }
    .ls-filter-btn:hover { color: var(--text-primary); background: var(--bg-surface); }
    .ls-filter-btn--active.ls-filter-btn--ballad { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,240,255,0.08); }
    .ls-filter-btn--active.ls-filter-btn--mid    { border-color: var(--accent-magenta); color: var(--accent-magenta); background: rgba(191,90,242,0.08); }
    .ls-filter-btn--active.ls-filter-btn--up     { border-color: #f0b429; color: #f0b429; background: rgba(240,180,41,0.08); }

    /* ── Song list ────────────────────────────────────────────────────── */
    .ls-list { flex: 1; overflow-y: auto; padding: var(--space-2) 0; min-height: 0; }
    .ls-list__item {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-4);
      font-size: var(--font-size-base);
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: background var(--transition-base), color var(--transition-base);
    }
    .ls-list__item:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .ls-list__item--active { background: var(--bg-elevated); color: var(--accent-cyan); font-weight: var(--font-weight-bold); }

    /* ── Remove button on imported songs ──────────────────────────────── */
    .ls-list__item-remove {
      background: none; border: none; color: var(--text-tertiary);
      font-size: 11px; cursor: pointer; padding: 2px 4px;
      margin-left: auto; flex-shrink: 0; border-radius: var(--radius-sm);
      transition: color var(--transition-base);
    }
    .ls-list__item-remove:hover { color: var(--accent-magenta); }

    /* ── Tag dots ─────────────────────────────────────────────────────── */
    .ls-tag-dots { display: flex; gap: 2px; flex-shrink: 0; }
    .ls-tag-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: transparent; }
    .ls-tag-dot--ballad { background: var(--accent-cyan); }
    .ls-tag-dot--mid    { background: var(--accent-magenta); }
    .ls-tag-dot--up     { background: #f0b429; }

    /* ── Set lists section ────────────────────────────────────────────── */
    .ls-setlists-section {
      border-top: 1px solid var(--border-subtle);
      flex-shrink: 0;
      max-height: 200px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .ls-setlists-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-2) var(--space-4);
      font-size: var(--font-size-sm);
      font-weight: var(--font-weight-bold);
      color: var(--text-secondary);
      position: sticky;
      top: 0;
      background: var(--bg-surface);
    }
    .ls-setlists-new {
      background: none; border: none; color: var(--accent-cyan);
      font-size: var(--font-size-sm); cursor: pointer; padding: 0;
    }
    .ls-setlists-new:hover { opacity: 0.8; }
    .ls-setlist-item {
      padding: var(--space-1) var(--space-4) var(--space-1) var(--space-6);
      font-size: var(--font-size-sm); color: var(--text-secondary);
      cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: background var(--transition-base), color var(--transition-base);
    }
    .ls-setlist-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
    .ls-setlist-item--active { color: var(--accent-cyan); font-weight: var(--font-weight-bold); }

    /* ── Sidebar toggle ───────────────────────────────────────────────── */
    .ls-sidebar--hidden { display: none; }
    .ls-toggle {
      position: absolute; top: var(--space-2); left: var(--space-2);
      z-index: 10; background: rgba(18,18,26,0.85); border: 1px solid var(--border-default);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-size: 20px; width: 44px; height: 44px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: color var(--transition-base), border-color var(--transition-base), opacity 0.3s ease;
    }
    .ls-toggle:hover { color: var(--accent-cyan); border-color: var(--accent-cyan); }
    .ls-toggle--hidden { opacity: 0; pointer-events: none; }

    /* ── Viewer ───────────────────────────────────────────────────────── */
    .ls-viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); position: relative; height: 100vh; }
    .ls-viewer__empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); font-size: var(--font-size-base); }
    .ls-viewer__empty[hidden], #ls-sheet-panel[hidden], #ls-setlist-panel[hidden] { display: none !important; }
    #ls-sheet-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; height: 100%; overflow: hidden; }
    .ls-viewer__header {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-3) var(--space-6);
      border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
    }
    .ls-viewer__header--hidden { display: none; }
    .ls-viewer__title { font-size: var(--font-size-base); font-weight: var(--font-weight-bold); color: var(--text-primary); flex: 1; }

    /* ── Tag picker ───────────────────────────────────────────────────── */
    .ls-tag-picker { display: flex; gap: var(--space-2); }
    .ls-tag-btn {
      background: var(--bg-elevated); border: 1px solid var(--border-default);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-size: 11px; padding: 2px 8px; cursor: pointer; transition: all var(--transition-base);
    }
    .ls-tag-btn--active.ls-tag-btn--ballad { border-color: var(--accent-cyan); color: var(--accent-cyan); background: rgba(0,240,255,0.08); }
    .ls-tag-btn--active.ls-tag-btn--mid    { border-color: var(--accent-magenta); color: var(--accent-magenta); background: rgba(191,90,242,0.08); }
    .ls-tag-btn--active.ls-tag-btn--up     { border-color: #f0b429; color: #f0b429; background: rgba(240,180,41,0.08); }
    .ls-tag-btn:not(.ls-tag-btn--active):hover { color: var(--text-primary); }
    .ls-viewer__img-wrap {
      flex: 1; min-height: 0; position: relative; overflow: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ls-viewer__img {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: contain; object-position: top center; display: block;
    }

    /* ── Set list editor ──────────────────────────────────────────────── */
    #ls-setlist-panel { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
    .ls-setlist-editor-header {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-3) var(--space-4);
      border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
    }
    .ls-setlist-close-btn {
      background: none; border: none; color: var(--accent-cyan);
      font-size: var(--font-size-sm); cursor: pointer;
      padding: var(--space-1) var(--space-2); border-radius: var(--radius-sm);
      flex-shrink: 0; white-space: nowrap;
    }
    .ls-setlist-close-btn:hover { opacity: 0.8; }
    .ls-setlist-name {
      flex: 1; background: transparent; border: none;
      border-bottom: 1px solid var(--border-default);
      color: var(--text-primary); font-size: var(--font-size-lg);
      font-weight: var(--font-weight-bold); padding: var(--space-1) 0; outline: none;
    }
    .ls-setlist-name:focus { border-bottom-color: var(--accent-cyan); }
    .ls-setlist-delete-btn {
      background: none; border: 1px solid var(--border-default);
      border-radius: var(--radius-sm); color: var(--text-secondary);
      font-size: var(--font-size-sm); padding: var(--space-1) var(--space-3); cursor: pointer;
    }
    .ls-setlist-delete-btn:hover { border-color: var(--accent-magenta); color: var(--accent-magenta); }
    .ls-setlist-hint {
      padding: var(--space-2) var(--space-6); font-size: var(--font-size-sm);
      color: var(--text-secondary); margin: 0; flex-shrink: 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .ls-setlist-songs { flex: 1; overflow-y: auto; padding: var(--space-2) 0; }
    .ls-setlist-empty { color: var(--text-secondary); font-size: var(--font-size-sm); padding: var(--space-8) var(--space-6); margin: 0; }
    .ls-setlist-row {
      display: flex; align-items: center; gap: var(--space-3);
      padding: var(--space-2) var(--space-4); font-size: var(--font-size-sm);
      transition: background var(--transition-base); cursor: default; user-select: none;
    }
    .ls-setlist-row:hover { background: var(--bg-elevated); }
    .ls-setlist-row__num { color: var(--text-secondary); font-size: 11px; width: 18px; text-align: right; flex-shrink: 0; }
    .ls-setlist-row__name { flex: 1; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ls-setlist-row__name:hover { color: var(--accent-cyan); }
    .ls-setlist-row__btn {
      background: none; border: none; color: var(--text-secondary);
      font-size: 13px; cursor: pointer; padding: 2px 4px; line-height: 1;
      border-radius: var(--radius-sm); flex-shrink: 0;
    }
    .ls-setlist-row__btn:hover:not(:disabled) { color: var(--text-primary); background: var(--bg-elevated); }
    .ls-setlist-row__btn:disabled { opacity: 0.25; cursor: default; }
    .ls-setlist-row__btn--remove:hover { color: var(--accent-magenta) !important; }
  </style>
</head>
<body>
  <div class="leadsheets-panel" id="leadsheets-panel"></div>
  <input type="file" id="ls-file-input" multiple accept="image/*" style="display:none">

  <script>
  (function() {
    // ── Helpers ──────────────────────────────────────────────────────
    const $ = (sel, parent) => (parent || document).querySelector(sel);
    const TAG_LABELS = { ballad: 'Ballad', mid: 'Mid', up: 'Up' };

    // ── Built-in sheets (served as files) ────────────────────────────
    const BUILT_IN_FILES = [
      "All-Of-Me.png",
      "Autumn-Leaves.png",
      "Beautiful-Love.png",
      "Bewitched.png",
      "Blue-in-Green.png",
      "Body-and-Soul.png",
      "Cheek-To-Cheek.png",
      "Dont-Get-Around-much-Anymore.png",
      "Dream-a-Little-Dream.png",
      "Emily.png",
      "How-High-The-Moon.png",
      "Its-Only-A-Paper-Moon.png",
      "Mercy-Mercy-Mercy.png",
      "Misty.png",
      "My-Favorite-Things.png",
      "My-Funny-Valentine.png",
      "Someday-My-Prince.png",
      "Stella-By-Starlight.png",
      "Summertime.png",
      "Sunday-Kind-of-Love.png",
      "there-will-never-be-another-you.png"
    ];

    let sheets = BUILT_IN_FILES.map(f => ({
      title: f.replace(/\.png$/, '').replace(/-/g, ' '),
      url: 'assets/leadsheets/' + f,
      builtIn: true
    }));

    // ── IndexedDB for user-imported sheets ───────────────────────────
    const IDB_NAME = 'leadsheets-db';
    const IDB_STORE = 'images';

    function openIDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(IDB_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function loadUserSheets() {
      try {
        const db = await openIDB();
        const tx = db.transaction(IDB_STORE, 'readonly');
        const store = tx.objectStore(IDB_STORE);
        const keys = await new Promise((res, rej) => {
          const r = store.getAllKeys();
          r.onsuccess = () => res(r.result);
          r.onerror = () => rej(r.error);
        });
        for (const key of keys) {
          const blob = await new Promise((res, rej) => {
            const r = store.get(key);
            r.onsuccess = () => res(r.result);
            r.onerror = () => rej(r.error);
          });
          if (blob) {
            sheets.push({
              title: key,
              url: URL.createObjectURL(blob),
              builtIn: false
            });
          }
        }
        db.close();
      } catch (e) {
        console.warn('Could not load user sheets from IndexedDB:', e);
      }
      sortSheets();
    }

    async function saveUserSheet(name, blob) {
      const db = await openIDB();
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(blob, name);
      await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
      db.close();
    }

    async function deleteUserSheet(name) {
      const db = await openIDB();
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(name);
      await new Promise((res, rej) => { tx.oncomplete = res; tx.onerror = rej; });
      db.close();
    }

    function sortSheets() {
      sheets.sort((a, b) => a.title.localeCompare(b.title));
      filteredSheets = [...sheets];
    }

    async function importSheets() {
      const fileInput = $('#ls-file-input');
      fileInput.value = '';
      fileInput.click();
    }

    async function handleFileImport(files) {
      for (const file of files) {
        const name = file.name
          .replace(/\.(png|jpg|jpeg|webp|gif)$/i, '')
          .replace(/[-_]/g, ' ');
        if (sheets.some(s => s.title === name)) continue;
        await saveUserSheet(name, file);
        sheets.push({
          title: name,
          url: URL.createObjectURL(file),
          builtIn: false
        });
      }
      sortSheets();
      applyFilter();
    }

    async function removeUserSheet(title) {
      await deleteUserSheet(title);
      const idx = sheets.findIndex(s => s.title === title && !s.builtIn);
      if (idx !== -1) {
        URL.revokeObjectURL(sheets[idx].url);
        sheets.splice(idx, 1);
      }
      sortSheets();
      if (selectedTitle === title) {
        selectedTitle = null;
        sheetPanel.hidden = true;
        viewerEmpty.hidden = false;
      }
      applyFilter();
    }

    // ── Persistence ────────────────────────────────────────────────
    function loadTags() {
      try {
        const raw = JSON.parse(localStorage.getItem('ls_tags') || '{}');
        const out = {};
        for (const [k, v] of Object.entries(raw)) {
          out[k] = Array.isArray(v) ? v : (v ? [v] : []);
        }
        return out;
      } catch { return {}; }
    }
    function saveTags(t) { localStorage.setItem('ls_tags', JSON.stringify(t)); }

    function loadSetLists() {
      try { return JSON.parse(localStorage.getItem('ls_setlists') || '[]'); } catch { return []; }
    }
    function saveSetLists(sl) { localStorage.setItem('ls_setlists', JSON.stringify(sl)); }

    // ── State ──────────────────────────────────────────────────────
    let tags = loadTags();
    let setLists = loadSetLists();
    let selectedTitle = null;
    let activeSetListId = null;
    let tagFilters = new Set();
    let filteredSheets = [...sheets];

    let listEl, setListsEl, viewerImg, viewerTitleEl, viewerEmpty,
        viewerHeader, tagPickerEl, sheetPanel, setListPanel,
        setListNameEl, setListSongsEl, searchEl;
    let sidebarEl, toggleBtn;

    function showSidebar() {
      if (!sidebarEl) return;
      sidebarEl.classList.remove('ls-sidebar--hidden');
      toggleBtn.classList.add('ls-toggle--hidden');
      viewerHeader && viewerHeader.classList.remove('ls-viewer__header--hidden');
    }

    function hideSidebar() {
      if (!sidebarEl) return;
      sidebarEl.classList.add('ls-sidebar--hidden');
      toggleBtn.classList.add('ls-toggle--hidden');
      viewerHeader && viewerHeader.classList.add('ls-viewer__header--hidden');
    }

    // ── Tag helpers ────────────────────────────────────────────────
    function getTags(title) { return tags[title] || []; }
    function toggleTag(title, tag) {
      const current = getTags(title);
      const idx = current.indexOf(tag);
      if (idx === -1) current.push(tag);
      else current.splice(idx, 1);
      tags[title] = current;
      saveTags(tags);
    }

    // ── Set list helpers ───────────────────────────────────────────
    function getSetList(id) { return setLists.find(sl => sl.id === id); }
    function newSetList() {
      const sl = { id: Date.now().toString(), name: 'New Set List', songs: [] };
      setLists.push(sl);
      saveSetLists(setLists);
      return sl;
    }

    // ── Filter ─────────────────────────────────────────────────────
    function applyFilter(query) {
      const q = (query !== undefined ? query : (searchEl ? searchEl.value : '')).toLowerCase();
      filteredSheets = sheets.filter(s => {
        const matchesSearch = !q || s.title.toLowerCase().includes(q);
        if (!matchesSearch) return false;
        if (tagFilters.size === 0) return true;
        const songTags = getTags(s.title);
        return [...tagFilters].some(t => songTags.includes(t));
      });
      renderList();
    }

    // ── Render song list ───────────────────────────────────────────
    function renderList() {
      listEl.innerHTML = '';
      for (const sheet of filteredSheets) {
        const songTags = getTags(sheet.title);
        const item = document.createElement('div');
        item.className = 'ls-list__item';
        if (sheet.title === selectedTitle) item.classList.add('ls-list__item--active');

        const dots = document.createElement('span');
        dots.className = 'ls-tag-dots';
        for (const tag of ['ballad', 'mid', 'up']) {
          const dot = document.createElement('span');
          dot.className = 'ls-tag-dot ls-tag-dot--' + (songTags.includes(tag) ? tag : 'none');
          dots.appendChild(dot);
        }
        item.appendChild(dots);

        const label = document.createElement('span');
        label.textContent = sheet.title;
        label.style.flex = '1';
        label.style.overflow = 'hidden';
        label.style.textOverflow = 'ellipsis';
        item.appendChild(label);

        if (!sheet.builtIn) {
          const removeBtn = document.createElement('button');
          removeBtn.className = 'ls-list__item-remove';
          removeBtn.textContent = '\u2715';
          removeBtn.title = 'Remove imported sheet';
          removeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            removeUserSheet(sheet.title);
          });
          item.appendChild(removeBtn);
        }

        item.addEventListener('click', () => {
          if (activeSetListId) addToActiveSetList(sheet.title);
          else selectSheet(sheet);
        });
        listEl.appendChild(item);
      }
    }

    // ── Render set lists in sidebar ────────────────────────────────
    function renderSetListsSidebar() {
      setListsEl.innerHTML = '';
      for (const sl of setLists) {
        const item = document.createElement('div');
        item.className = 'ls-setlist-item';
        if (sl.id === activeSetListId) item.classList.add('ls-setlist-item--active');
        item.textContent = sl.name;
        item.addEventListener('click', () => {
          if (activeSetListId === sl.id) closeSetList();
          else openSetList(sl.id);
        });
        setListsEl.appendChild(item);
      }
    }

    function closeSetList() {
      activeSetListId = null;
      sheetPanel.hidden = true;
      setListPanel.hidden = true;
      viewerEmpty.hidden = false;
      renderSetListsSidebar();
    }

    // ── Select a sheet ─────────────────────────────────────────────
    function selectSheet(sheet) {
      selectedTitle = sheet.title;
      activeSetListId = null;

      for (const item of listEl.querySelectorAll('.ls-list__item')) {
        const isActive = item.querySelector('span:last-child')?.textContent === sheet.title;
        item.classList.toggle('ls-list__item--active', isActive);
      }
      const activeItem = listEl.querySelector('.ls-list__item--active');
      if (activeItem) activeItem.scrollIntoView({ block: 'nearest' });

      sheetPanel.hidden = false;
      setListPanel.hidden = true;
      viewerEmpty.hidden = true;
      viewerImg.hidden = false;
      viewerTitleEl.textContent = sheet.title;
      viewerImg.src = sheet.url;
      viewerHeader.hidden = false;

      renderTagPicker();
      renderSetListsSidebar();
    }

    // ── Tag picker in viewer header ────────────────────────────────
    function renderTagPicker() {
      tagPickerEl.innerHTML = '';
      const current = getTags(selectedTitle);
      for (const [key, label] of Object.entries(TAG_LABELS)) {
        const btn = document.createElement('button');
        btn.className = 'ls-tag-btn ls-tag-btn--' + key;
        if (current.includes(key)) btn.classList.add('ls-tag-btn--active');
        btn.textContent = label;
        btn.addEventListener('click', () => {
          toggleTag(selectedTitle, key);
          renderTagPicker();
          renderList();
        });
        tagPickerEl.appendChild(btn);
      }
    }

    // ── Set list operations ────────────────────────────────────────
    function openSetList(id) {
      activeSetListId = id;
      selectedTitle = null;
      sheetPanel.hidden = true;
      setListPanel.hidden = false;
      viewerEmpty.hidden = true;

      for (const item of listEl.querySelectorAll('.ls-list__item')) {
        item.classList.remove('ls-list__item--active');
      }
      renderSetListsSidebar();
      renderSetListEditor();
    }

    function renderSetListEditor() {
      const sl = getSetList(activeSetListId);
      if (!sl) return;

      setListNameEl.value = sl.name;
      setListSongsEl.innerHTML = '';

      if (!sl.songs.length) {
        setListSongsEl.innerHTML = '<p class="ls-setlist-empty">No songs yet. Click songs in the library to add them.</p>';
        return;
      }

      sl.songs.forEach((title, i) => {
        const row = document.createElement('div');
        row.className = 'ls-setlist-row';

        const num = document.createElement('span');
        num.className = 'ls-setlist-row__num';
        num.textContent = i + 1;

        const songTags = getTags(title);
        const dots = document.createElement('span');
        dots.className = 'ls-tag-dots';
        for (const tag of ['ballad', 'mid', 'up']) {
          const dot = document.createElement('span');
          dot.className = 'ls-tag-dot ls-tag-dot--' + (songTags.includes(tag) ? tag : 'none');
          dots.appendChild(dot);
        }

        const name = document.createElement('span');
        name.className = 'ls-setlist-row__name';
        name.textContent = title;
        name.addEventListener('click', () => {
          const sheet = sheets.find(s => s.title === title);
          if (sheet) selectSheet(sheet);
        });

        const upBtn = document.createElement('button');
        upBtn.className = 'ls-setlist-row__btn';
        upBtn.textContent = '\u25B2';
        upBtn.disabled = i === 0;
        upBtn.addEventListener('click', () => {
          [sl.songs[i - 1], sl.songs[i]] = [sl.songs[i], sl.songs[i - 1]];
          saveSetLists(setLists);
          renderSetListEditor();
        });

        const downBtn = document.createElement('button');
        downBtn.className = 'ls-setlist-row__btn';
        downBtn.textContent = '\u25BC';
        downBtn.disabled = i === sl.songs.length - 1;
        downBtn.addEventListener('click', () => {
          [sl.songs[i], sl.songs[i + 1]] = [sl.songs[i + 1], sl.songs[i]];
          saveSetLists(setLists);
          renderSetListEditor();
        });

        const removeBtn = document.createElement('button');
        removeBtn.className = 'ls-setlist-row__btn ls-setlist-row__btn--remove';
        removeBtn.textContent = '\u2715';
        removeBtn.addEventListener('click', () => {
          sl.songs.splice(i, 1);
          saveSetLists(setLists);
          renderSetListEditor();
        });

        row.appendChild(num);
        row.appendChild(dots);
        row.appendChild(name);
        row.appendChild(upBtn);
        row.appendChild(downBtn);
        row.appendChild(removeBtn);
        setListSongsEl.appendChild(row);
      });
    }

    function addToActiveSetList(title) {
      const sl = getSetList(activeSetListId);
      if (!sl || sl.songs.includes(title)) return;
      sl.songs.push(title);
      saveSetLists(setLists);
      renderSetListEditor();
    }

    // ── Keyboard navigation ────────────────────────────────────────
    function navigate(dir) {
      if (activeSetListId) return;
      const current = selectedTitle ? sheets.findIndex(s => s.title === selectedTitle) : -1;
      const next = current + dir;
      if (next < 0 || next >= sheets.length) return;
      selectSheet(sheets[next]);
      applyFilter();
    }

    // ── Init ───────────────────────────────────────────────────────
    async function init() {
      await loadUserSheets();

      const panel = $('#leadsheets-panel');
      if (!panel) return;

      panel.innerHTML = '<div class="ls-layout">' +
        '<aside class="ls-sidebar">' +
          '<div class="ls-search">' +
            '<input class="ls-search__input" type="search" placeholder="Search..." autocomplete="off">' +
            '<button class="ls-import-btn" id="ls-import-btn" title="Import lead sheets">+</button>' +
          '</div>' +
          '<div class="ls-setlists-section">' +
            '<div class="ls-setlists-header">' +
              '<span>Set Lists</span>' +
              '<button class="ls-setlists-new" id="ls-setlists-new">+ New</button>' +
            '</div>' +
            '<div id="ls-setlists-list"></div>' +
          '</div>' +
          '<div class="ls-tag-filters" id="ls-tag-filters">' +
            '<button class="ls-filter-btn ls-filter-btn--ballad" data-tag="ballad">Ballad</button>' +
            '<button class="ls-filter-btn ls-filter-btn--mid" data-tag="mid">Mid</button>' +
            '<button class="ls-filter-btn ls-filter-btn--up" data-tag="up">Up</button>' +
          '</div>' +
          '<div class="ls-list" id="ls-list"></div>' +
        '</aside>' +
        '<main class="ls-viewer">' +
          '<button class="ls-toggle" id="ls-toggle" title="Toggle sidebar">\u2630</button>' +
          '<div class="ls-viewer__empty" id="ls-viewer-empty">Select a lead sheet</div>' +
          '<div id="ls-sheet-panel" hidden>' +
            '<div class="ls-viewer__header" id="ls-viewer-header">' +
              '<span class="ls-viewer__title" id="ls-viewer-title"></span>' +
              '<div class="ls-tag-picker" id="ls-tag-picker"></div>' +
            '</div>' +
            '<div class="ls-viewer__img-wrap"><img class="ls-viewer__img" id="ls-viewer-img" alt=""></div>' +
          '</div>' +
          '<div id="ls-setlist-panel" hidden>' +
            '<div class="ls-setlist-editor-header">' +
              '<button class="ls-setlist-close-btn" id="ls-setlist-close">\u2190 Library</button>' +
              '<input class="ls-setlist-name" id="ls-setlist-name" type="text">' +
              '<button class="ls-setlist-delete-btn" id="ls-setlist-delete">Delete</button>' +
            '</div>' +
            '<p class="ls-setlist-hint">Click a song in the library to add it to this set list.</p>' +
            '<div class="ls-setlist-songs" id="ls-setlist-songs"></div>' +
          '</div>' +
        '</main>' +
      '</div>';

      listEl         = panel.querySelector('#ls-list');
      setListsEl     = panel.querySelector('#ls-setlists-list');
      viewerImg      = panel.querySelector('#ls-viewer-img');
      viewerTitleEl  = panel.querySelector('#ls-viewer-title');
      viewerEmpty    = panel.querySelector('#ls-viewer-empty');
      viewerHeader   = panel.querySelector('#ls-viewer-header');
      tagPickerEl    = panel.querySelector('#ls-tag-picker');
      sheetPanel     = panel.querySelector('#ls-sheet-panel');
      setListPanel   = panel.querySelector('#ls-setlist-panel');
      setListNameEl  = panel.querySelector('#ls-setlist-name');
      setListSongsEl = panel.querySelector('#ls-setlist-songs');
      searchEl       = panel.querySelector('.ls-search__input');

      sidebarEl = panel.querySelector('.ls-sidebar');
      toggleBtn = panel.querySelector('#ls-toggle');
      toggleBtn.classList.add('ls-toggle--hidden');

      /* Tap anywhere on viewer toggles sidebar */
      panel.querySelector('.ls-viewer').addEventListener('click', () => {
        if (sidebarEl.classList.contains('ls-sidebar--hidden')) {
          showSidebar();
        } else {
          hideSidebar();
        }
      });

      /* Import button */
      panel.querySelector('#ls-import-btn').addEventListener('click', (e) => {
        e.stopPropagation();
        importSheets();
      });

      /* File input handler */
      $('#ls-file-input').addEventListener('change', (e) => {
        if (e.target.files.length) handleFileImport(e.target.files);
      });

      searchEl.addEventListener('input', () => applyFilter());

      for (const btn of panel.querySelectorAll('.ls-filter-btn')) {
        btn.addEventListener('click', () => {
          const tag = btn.dataset.tag;
          if (tagFilters.has(tag)) tagFilters.delete(tag);
          else tagFilters.add(tag);
          btn.classList.toggle('ls-filter-btn--active', tagFilters.has(tag));
          applyFilter();
        });
      }

      panel.querySelector('#ls-setlists-new').addEventListener('click', () => {
        const sl = newSetList();
        renderSetListsSidebar();
        openSetList(sl.id);
      });

      setListNameEl.addEventListener('input', () => {
        const sl = getSetList(activeSetListId);
        if (sl) { sl.name = setListNameEl.value; saveSetLists(setLists); renderSetListsSidebar(); }
      });

      panel.querySelector('#ls-setlist-close').addEventListener('click', closeSetList);

      panel.querySelector('#ls-setlist-delete').addEventListener('click', () => {
        setLists = setLists.filter(sl => sl.id !== activeSetListId);
        saveSetLists(setLists);
        activeSetListId = null;
        sheetPanel.hidden = true;
        setListPanel.hidden = true;
        viewerEmpty.hidden = false;
        renderSetListsSidebar();
      });

      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
        if (e.key === 'ArrowRight') navigate(1);
        else if (e.key === 'ArrowLeft') navigate(-1);
      });

      applyFilter();
      renderSetListsSidebar();
    }

    // ── Register service worker ────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }

    init();
  })();
  </script>
</body>
</html>
